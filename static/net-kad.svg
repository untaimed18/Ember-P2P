  <line x1="8.5" y1="16.5" x2="15.5" y2="16.5" stroke="#e0f7fa" stroke-width="0.9" opacity="0.7"/>
  <line x1="12" y1="6.5" x2="15.5" y2="16.5" stroke="#e0f7fa" stroke-width="0.6" opacity="0.4"/>
